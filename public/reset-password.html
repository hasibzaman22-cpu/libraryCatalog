<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset password — Al-Mawā’il</title>
    <link rel="stylesheet" href="/css/auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-hero" aria-hidden="true">
      <div class="auth-hero-inner">
        <p class="auth-brand">Al-Mawā’il</p>
        <h2 class="auth-headline">Set a new password.</h2>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-card">
        <h1>Reset password</h1>
        <form id="reset-form" class="auth-form" novalidate>
          <div class="auth-field">
            <label for="password">New password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              required
              minlength="8"
            />
          </div>
          <div class="auth-field">
            <label for="password2">Confirm new password</label>
            <input
              id="password2"
              name="password2"
              type="password"
              autocomplete="new-password"
              required
            />
          </div>
          <button type="submit" class="auth-submit" id="submit-btn">Update password</button>
        </form>
        <p id="auth-message" class="auth-message" role="alert"></p>
        <p class="auth-footer"><a href="/login.html">Back to sign in</a></p>
      </div>
    </div>
    <script type="module" src="/js/reset-password.js"></script>
  </body>
</html>
