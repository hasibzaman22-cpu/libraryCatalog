<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot password — Mawa'il</title>
    <link rel="stylesheet" href="/css/auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-hero" aria-hidden="true">
      <div class="auth-hero-inner">
        <p class="auth-brand">Mawa'il <span class="brand-ar" lang="ar" dir="rtl">موئل</span></p>
        <h2 class="auth-headline">Reset your password.</h2>
        <p class="auth-sub">Enter your account email and we will send a reset link.</p>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-card">
        <h1>Forgot password</h1>
        <form id="forgot-form" class="auth-form" novalidate>
          <div class="auth-field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>
          <button type="submit" class="auth-submit" id="submit-btn">Send reset link</button>
        </form>
        <p id="auth-message" class="auth-message" role="alert"></p>
        <p class="auth-footer"><a href="/login.html">Back to sign in</a></p>
      </div>
    </div>
    <script type="module" src="/js/forgot-password.js"></script>
  </body>
</html>
