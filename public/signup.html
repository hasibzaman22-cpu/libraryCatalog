<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account — Al-Mawā’il</title>
    <link rel="stylesheet" href="/css/auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-hero" aria-hidden="true">
      <div class="auth-hero-inner">
        <p class="auth-brand">Al-Mawā’il</p>
        <h2 class="auth-headline">Start your refuge for books and notes.</h2>
        <p class="auth-sub">
          A seeker’s haven to record what you read and stay connected with friends.
        </p>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-card">
        <h1>Create Account</h1>
        <form id="signup-form" class="auth-form" novalidate>
          <div class="auth-field">
            <label for="name">Display Name</label>
            <input
              id="name"
              name="name"
              type="text"
              autocomplete="name"
              placeholder="Optional"
            />
          </div>
          <div class="auth-field">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />
          </div>
          <div class="auth-field">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              required
              minlength="8"
            />
          </div>
          <div class="auth-field">
            <label for="password2">Confirm Password</label>
            <input
              id="password2"
              name="password2"
              type="password"
              autocomplete="new-password"
              required
            />
          </div>
          <label class="auth-checkbox">
            <input
              id="sms-opt-in"
              name="smsOptIn"
              type="checkbox"
              required
            />
            <span>
              I agree to receive SMS book recommendations from friends who refer books to me.
            </span>
          </label>
          <button type="submit" class="auth-submit" id="submit-btn">
            Create My Account
          </button>
        </form>

        <p id="auth-message" class="auth-message" role="alert"></p>

        <p class="auth-footer">
          Already have an account?
          <a href="/login.html">Sign in</a>
        </p>
      </div>
    </div>
    <script type="module" src="/js/signup.js"></script>
  </body>
</html>
