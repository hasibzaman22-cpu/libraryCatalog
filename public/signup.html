<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account — Library catalog</title>
    <link rel="stylesheet" href="/css/auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-hero" aria-hidden="true">
      <div class="auth-hero-inner">
        <p class="auth-brand">Library catalog</p>
        <h2 class="auth-headline">Start your personal library.</h2>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-card">
        <h1>Create account</h1>
        <form id="signup-form" class="auth-form" novalidate>
          <div class="auth-field">
            <label for="name">Display Name</label>
            <input
              id="name"
              name="name"
              type="text"
              autocomplete="name"
              placeholder="Optional"
            />
          </div>
          <div class="auth-field">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />
          </div>
          <div class="auth-field">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              required
              minlength="8"
            />
          </div>
          <div class="auth-field">
            <label for="password2">Confirm Password</label>
            <input
              id="password2"
              name="password2"
              type="password"
              autocomplete="new-password"
              required
            />
          </div>
          <button type="submit" class="auth-submit" id="submit-btn">
            Create My Account
          </button>
        </form>

        <p id="auth-message" class="auth-message" role="alert"></p>

        <p class="auth-footer">
          Already have an account?
          <a href="/login.html">Sign in</a>
        </p>
      </div>
    </div>
    <script type="module" src="/js/signup.js"></script>
  </body>
</html>
