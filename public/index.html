<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Catalog</title>
    <link rel="stylesheet" href="/css/catalog.css" />
  </head>
  <body>
    <header class="catalog-nav">
      <div class="catalog-nav-inner">
        <a class="catalog-logo" href="/">Library catalog</a>
        <div class="catalog-nav-actions">
          <span class="catalog-user" id="user-label" aria-live="polite"></span>
          <button type="button" class="btn-nav" id="logout-btn" hidden>
            Sign out
          </button>
          <a class="btn-nav btn-nav-primary" href="/login.html" id="login-link" hidden
            >Sign in</a
          >
        </div>
      </div>
    </header>

    <main class="catalog-main">
      <div class="catalog-intro">
        <h1>Your Library</h1>
        <p>
          Books grouped by Category.
        </p>
      </div>

      <div class="catalog-layout">
        <section class="card" aria-labelledby="add-heading">
          <h2 id="add-heading">Add a book</h2>
          <p class="card-desc">New rows appear under the matching shelf below.</p>
          <form id="add-form" class="add-form" novalidate>
            <div class="field">
              <label for="title">Title</label>
              <input id="title" type="text" name="title" required autocomplete="off" />
            </div>
            <div class="field">
              <label for="author">Author</label>
              <input
                id="author"
                type="text"
                name="author"
                required
                autocomplete="off"
                list="author-suggestions"
                placeholder="Pick a past author or type a new one"
              />
              <datalist id="author-suggestions"></datalist>
              <p class="field-hint" id="author-hint"></p>
            </div>
            <div class="field">
              <label for="publisher">Publisher</label>
              <input
                id="publisher"
                type="text"
                name="publisher"
                required
                autocomplete="off"
                list="publisher-suggestions"
                placeholder="Pick a past publisher or type a new one"
              />
              <datalist id="publisher-suggestions"></datalist>
              <p class="field-hint" id="publisher-hint"></p>
            </div>
            <div class="field">
              <label for="category">Category</label>
              <input
                id="category"
                type="text"
                name="category"
                required
                autocomplete="off"
                list="category-suggestions"
                placeholder="Choose a suggestion or type a new shelf"
              />
              <datalist id="category-suggestions"></datalist>
              <p class="field-hint" id="category-hint"></p>
            </div>
            <button type="submit" class="btn-add">Add to shelf</button>
          </form>
          <p id="form-message" class="form-message" role="status" aria-live="polite"></p>
        </section>

        <section class="shelves-wrap" aria-labelledby="shelves-heading">
          <div class="shelves-header">
            <h2 id="shelves-heading">Shelves</h2>
            <button type="button" class="btn-nav" id="refresh-btn">Refresh</button>
          </div>
          <div id="shelves" class="shelves"></div>
        </section>
      </div>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
