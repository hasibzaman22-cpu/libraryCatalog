<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — Al-Mawā’il</title>
    <link rel="stylesheet" href="/css/auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-hero" aria-hidden="true">
      <div class="auth-hero-inner">
        <p class="auth-brand">Al-Mawā’il</p>
        <h2 class="auth-headline">A seeker’s refuge for reading.</h2>
        <p class="auth-sub">
          Log books, share notes with friends, and find clarity — all in one
          place.
        </p>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-card">
        <h1>Sign in</h1>
        <p class="lead">Use your email and password.</p>

        <form id="login-form" class="auth-form" novalidate>
          <div class="auth-field">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />
          </div>
          <div class="auth-field">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit" class="auth-submit" id="submit-btn">
            Sign in
          </button>
        </form>
        <p class="auth-link-row">
          <a href="/forgot-password.html">Forgot password?</a>
        </p>

        <p id="auth-message" class="auth-message" role="alert"></p>

        <p class="auth-footer">
          No account?
          <a href="/signup.html">Create one</a>
        </p>
      </div>
    </div>
    <script type="module" src="/js/login.js"></script>
  </body>
</html>
